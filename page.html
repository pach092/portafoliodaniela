<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nuevo mensaje – Daniela Coronado</title>
</head>
<body style="margin:0;padding:0;background-color:#0d0a18;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation"
    style="background-color:#0d0a18;padding:48px 20px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" role="presentation"
          style="max-width:600px;width:100%;">

          <!-- Logo / header -->
          <tr>
            <td style="padding-bottom:36px;text-align:center;">
              <table cellpadding="0" cellspacing="0" role="presentation"
                style="margin:0 auto;border-top:2px solid #7c3aed;padding-top:20px;">
                <tr>
                  <td style="text-align:center;">
                    <p style="margin:0;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;
                              color:#c4b5fd;font-weight:600;">Portafolio</p>
                    <p style="margin:6px 0 0;font-size:26px;font-weight:700;color:#ffffff;
                              letter-spacing:-0.02em;">Daniela Coronado</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background-color:#16102a;border:1px solid rgba(124,58,237,0.25);
                       border-radius:20px;padding:36px 32px;">

              <!-- Badge -->
              <div style="margin-bottom:28px;">
                <span style="display:inline-block;background-color:rgba(124,58,237,0.18);
                             border:1px solid rgba(167,139,250,0.35);border-radius:100px;
                             padding:5px 14px;font-size:10px;color:#c4b5fd;
                             letter-spacing:0.18em;text-transform:uppercase;font-weight:600;">
                  ✦ Nuevo mensaje de contacto
                </span>
              </div>

              <!-- Asunto -->
              <h2 style="margin:0 0 28px;font-size:22px;font-weight:700;color:#ffffff;
                         line-height:1.3;">${a}</h2>

              <!-- Divider -->
              <div style="border-top:1px solid rgba(255,255,255,0.07);margin-bottom:24px;"></div>

              <!-- Fields -->
              <table width="100%" cellpadding="0" cellspacing="0" role="presentation">

                <!-- Nombre -->
                <tr>
                  <td style="padding-bottom:20px;">
                    <p style="margin:0 0 5px;font-size:10px;color:rgba(255,255,255,0.3);
                               letter-spacing:0.16em;text-transform:uppercase;font-weight:600;">
                      Nombre
                    </p>
                    <p style="margin:0;font-size:15px;color:rgba(255,255,255,0.85);font-weight:500;">
                      ${n}
                    </p>
                  </td>
                </tr>

                <!-- Email -->
                <tr>
                  <td style="padding-bottom:20px;border-top:1px solid rgba(255,255,255,0.06);
                             padding-top:20px;">
                    <p style="margin:0 0 5px;font-size:10px;color:rgba(255,255,255,0.3);
                               letter-spacing:0.16em;text-transform:uppercase;font-weight:600;">
                      Email
                    </p>
                    <a href="mailto:${e}"
                       style="color:#a78bfa;font-size:15px;text-decoration:none;font-weight:500;">
                      ${e}
                    </a>
                  </td>
                </tr>

                <!-- Mensaje -->
                <tr>
                  <td style="border-top:1px solid rgba(255,255,255,0.06);padding-top:20px;">
                    <p style="margin:0 0 12px;font-size:10px;color:rgba(255,255,255,0.3);
                               letter-spacing:0.16em;text-transform:uppercase;font-weight:600;">
                      Mensaje
                    </p>
                    <div style="background-color:rgba(255,255,255,0.04);
                                border:1px solid rgba(255,255,255,0.08);
                                border-left:3px solid rgba(124,58,237,0.6);
                                border-radius:10px;padding:18px 20px;">
                      <p style="margin:0;font-size:14px;color:rgba(255,255,255,0.65);
                                 line-height:1.75;">${m}</p>
                    </div>
                  </td>
                </tr>
              </table>

              <!-- Reply CTA -->
              <div style="margin-top:32px;text-align:center;">
                <a href="mailto:${e}?subject=Re: ${a}"
                   style="display:inline-block;
                          background:linear-gradient(135deg,#7c3aed 0%,#4c1d95 100%);
                          color:#ffffff;font-size:14px;font-weight:600;text-decoration:none;
                          padding:13px 36px;border-radius:100px;letter-spacing:0.01em;">
                  Responder a ${n}
                </a>
              </div>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding-top:28px;text-align:center;">
              <p style="margin:0;font-size:11px;color:rgba(255,255,255,0.2);">
                danisco.com.co &middot; danielaacoronador@gmail.com
              </p>
              <p style="margin:6px 0 0;font-size:10px;color:rgba(255,255,255,0.12);">
                Este correo fue generado automáticamente desde el formulario de contacto.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
